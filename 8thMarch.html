<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Women's Day Card</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Playfair+Display:wght@500&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
padding:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#ffe6f0,#fff5f8);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.container{
width:100%;
max-width:520px;
height:90vh;
overflow:auto;
padding:20px;
}

.step{
background:white;
padding:40px 30px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.15);
text-align:center;
animation:fade .7s;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px)}
to{opacity:1; transform:translateY(0)}
}

h2{
font-family:'Dancing Script',cursive;
font-size:38px;
color:#e91e63;
margin-bottom:20px;
}

input{
width:80%;
padding:14px;
border:none;
border-radius:30px;
outline:none;
font-size:16px;
background:#fff0f6;
box-shadow:inset 0 2px 6px rgba(0,0,0,0.1);
text-align:center;
transition:.3s;
}

input:focus{
background:white;
box-shadow:0 0 10px #ff8fb1;
}

.upload{
display:inline-block;
margin-top:20px;
padding:12px 25px;
background:linear-gradient(45deg,#ff8fb1,#ff5f95);
color:white;
border-radius:30px;
cursor:pointer;
font-size:16px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
transition:.3s;
}

.upload:hover{
transform:scale(1.05);
}

input[type=file]{
display:none;
}

/* magical button */

.magicBtn{
margin-top:25px;
padding:13px 30px;
border:none;
background:linear-gradient(45deg,#ff5f95,#ff2e75);
color:white;
border-radius:30px;
font-size:17px;
cursor:pointer;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
transition:.3s;
display:none;
}

.magicBtn:hover{
transform:scale(1.08);
}

.card{
background:white;
border-radius:20px;
padding:40px 30px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,0.15);
position:relative;
overflow:hidden;
}

.flower{
position:absolute;
font-size:32px;
opacity:.8;
}

.fl1{top:10px;left:10px}
.fl2{top:10px;right:10px}
.fl3{bottom:10px;left:10px}
.fl4{bottom:10px;right:10px}
.fl5{top:45%;left:-10px}
.fl6{top:45%;right:-10px}

.teddy{
position:absolute;
width:60px;
opacity:.85;
}

.t1{top:-20px;right:50px}
.t2{bottom:-10px;left:50px}

.photo-wrap{
position:relative;
width:170px;
height:170px;
margin:auto;
margin-bottom:20px;
}

.photo-wrap::before{
content:"";
position:absolute;
width:200px;
height:200px;
background:radial-gradient(circle,rgba(255,143,177,.5),transparent 70%);
top:-15px;
left:-15px;
border-radius:50%;
}

.profile{
width:170px;
height:170px;
border-radius:50%;
object-fit:cover;
position:relative;
z-index:2;
}

.title{
font-family:'Dancing Script',cursive;
font-size:42px;
color:#e91e63;
}

.subtitle{
font-family:'Playfair Display',serif;
font-size:30px;
color:#d81b60;
}

.message{
margin-top:15px;
line-height:1.7;
color:#555;
font-size:16px;
}

.from{
margin-top:20px;
color:#d81b60;
font-style:italic;
font-size:18px;
}

</style>
</head>

<body>

<div class="container">

<!-- STEP 1 -->

<div class="step" id="step1">
<h2>✨ Something Beautiful is Waiting ✨</h2>
<p>First tell me your beautiful name 🌸</p>

<input id="nameInput" placeholder="Type your name">

<br>
<button class="magicBtn" style="display:inline-block" onclick="nextStep()">Continue 💖</button>
</div>

<!-- STEP 2 -->

<div class="step" id="step2" style="display:none">

<h2>Almost Ready 🎀</h2>
<p>Add your lovely photo to reveal something special</p>

<label class="upload">
Choose Photo 📷
<input type="file" id="imageInput">
</label>

<br>

<button id="revealBtn" class="magicBtn" onclick="generateCard()">
✨ Reveal Your Surprise ✨
</button>

</div>

<!-- CARD -->

<div class="card" id="card" style="display:none">

<div class="flower fl1">🌸</div>
<div class="flower fl2">🌷</div>
<div class="flower fl3">🌹</div>
<div class="flower fl4">🌸</div>
<div class="flower fl5">🌺</div>
<div class="flower fl6">🌼</div>

<img class="teddy t1" src="https://pngimg.com/uploads/teddy_bear/teddy_bear_PNG34.png">
<img class="teddy t2" src="https://pngimg.com/uploads/teddy_bear/teddy_bear_PNG41.png">

<div class="photo-wrap">
<img id="profileImage" class="profile">
</div>

<div class="title">Happy</div>
<div class="subtitle">Women's Day</div>

<div class="message" id="wish"></div>

<div class="from">
With love ❤️ <br>
— Mayank Khare
</div>

</div>

</div>

<script>

let personName="";

const wishes=[

`<b>__NAME__</b>, you are a symbol of strength and grace.<br>
Your kindness lights up every heart around you.<br>
May your dreams grow bigger every day.<br>
The world shines brighter because of you.<br>
Keep inspiring everyone with your beautiful soul.`,

`Dear <b>__NAME__</b>, your courage and confidence are truly inspiring.<br>
You make life more beautiful just by being yourself.<br>
May happiness and success always walk beside you.<br>
Your smile is powerful enough to brighten any day.<br>
Never forget how amazing you are.`,

`<b>__NAME__</b>, today we celebrate the incredible person you are.<br>
Your strength and compassion make the world better.<br>
May your path always be filled with joy and success.<br>
Keep chasing your dreams fearlessly.<br>
You truly deserve all the happiness in the world.`

];

function nextStep(){

const name=document.getElementById("nameInput").value;

if(name===""){
alert("Please enter your name 😊");
return;
}

personName=name;

document.getElementById("step1").style.display="none";
document.getElementById("step2").style.display="block";

}

document.getElementById("imageInput").addEventListener("change",function(){

if(this.files.length>0){

document.getElementById("revealBtn").style.display="inline-block";

}

});

function generateCard(){

const file=document.getElementById("imageInput").files[0];

const reader=new FileReader();

reader.onload=function(e){

document.getElementById("profileImage").src=e.target.result;

document.getElementById("step2").style.display="none";
document.getElementById("card").style.display="block";

let wish=wishes[Math.floor(Math.random()*wishes.length)];
wish=wish.replace(/__NAME__/g,personName);

document.getElementById("wish").innerHTML=wish;

}

reader.readAsDataURL(file);

}

</script>

</body>
</html>
